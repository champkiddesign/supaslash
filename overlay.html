<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <title>Overlay</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent !important;
    }

    .edge-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      visibility: hidden;
    }

    .edge-glow.is-visible {
      visibility: visible;
      animation: edge-pulse 2.2s ease-in-out infinite;
    }

    .edge {
      position: absolute;
      pointer-events: none;
    }

    .edge-top {
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: linear-gradient(
        to bottom,
        rgba(255, 59, 48, 0.92) 0%,
        rgba(255, 59, 48, 0.55) 35%,
        rgba(255, 59, 48, 0.15) 70%,
        transparent 100%
      );
    }

    .edge-bottom {
      bottom: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: linear-gradient(
        to top,
        rgba(255, 59, 48, 0.92) 0%,
        rgba(255, 59, 48, 0.55) 35%,
        rgba(255, 59, 48, 0.15) 70%,
        transparent 100%
      );
    }

    .edge-left {
      top: 0;
      bottom: 0;
      left: 0;
      width: 56px;
      background: linear-gradient(
        to right,
        rgba(255, 59, 48, 0.92) 0%,
        rgba(255, 59, 48, 0.55) 35%,
        rgba(255, 59, 48, 0.15) 70%,
        transparent 100%
      );
    }

    .edge-right {
      top: 0;
      bottom: 0;
      right: 0;
      width: 56px;
      background: linear-gradient(
        to left,
        rgba(255, 59, 48, 0.92) 0%,
        rgba(255, 59, 48, 0.55) 35%,
        rgba(255, 59, 48, 0.15) 70%,
        transparent 100%
      );
    }

    .edge-glow::after {
      content: '';
      position: absolute;
      inset: 0;
      box-shadow:
        inset 0 0 70px 18px rgba(255, 59, 48, 0.45),
        inset 0 0 140px 36px rgba(255, 59, 48, 0.18);
    }

    @keyframes edge-pulse {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }

    .celebration-layer {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      visibility: hidden;
    }

    .celebration-layer.is-active {
      opacity: 1;
      visibility: visible;
    }

    .celebration-particle {
      position: absolute;
      bottom: -10%;
      left: var(--x, 50%);
      font-size: var(--size, 32px);
      line-height: 1;
      opacity: 0;
      animation: celebrate-float var(--duration, 2.4s) var(--delay, 0s) ease-out forwards;
    }

    @keyframes celebrate-float {
      0% {
        opacity: 1;
        transform: translateX(-50%) translateY(0) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translateX(calc(-50% + var(--drift, 0px))) translateY(-120vh) rotate(var(--spin, 20deg));
      }
    }
  </style>
</head>
<body>
  <div class="edge-glow">
    <div class="edge edge-top"></div>
    <div class="edge edge-bottom"></div>
    <div class="edge edge-left"></div>
    <div class="edge edge-right"></div>
  </div>
  <div id="celebration-layer" class="celebration-layer" aria-hidden="true"></div>
  <script src="overlay.js"></script>
</body>
</html>
