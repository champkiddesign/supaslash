<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>Overlay</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent !important;
    }

    .edge-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      animation: edge-pulse 2.2s ease-in-out infinite;
    }

    .edge {
      position: absolute;
      pointer-events: none;
    }

    .edge-top {
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: linear-gradient(
        to bottom,
        rgba(255, 59, 48, 0.92) 0%,
        rgba(255, 59, 48, 0.55) 35%,
        rgba(255, 59, 48, 0.15) 70%,
        transparent 100%
      );
    }

    .edge-bottom {
      bottom: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: linear-gradient(
        to top,
        rgba(255, 59, 48, 0.92) 0%,
        rgba(255, 59, 48, 0.55) 35%,
        rgba(255, 59, 48, 0.15) 70%,
        transparent 100%
      );
    }

    .edge-left {
      top: 0;
      bottom: 0;
      left: 0;
      width: 56px;
      background: linear-gradient(
        to right,
        rgba(255, 59, 48, 0.92) 0%,
        rgba(255, 59, 48, 0.55) 35%,
        rgba(255, 59, 48, 0.15) 70%,
        transparent 100%
      );
    }

    .edge-right {
      top: 0;
      bottom: 0;
      right: 0;
      width: 56px;
      background: linear-gradient(
        to left,
        rgba(255, 59, 48, 0.92) 0%,
        rgba(255, 59, 48, 0.55) 35%,
        rgba(255, 59, 48, 0.15) 70%,
        transparent 100%
      );
    }

    .edge-glow::after {
      content: '';
      position: absolute;
      inset: 0;
      box-shadow:
        inset 0 0 70px 18px rgba(255, 59, 48, 0.45),
        inset 0 0 140px 36px rgba(255, 59, 48, 0.18);
    }

    @keyframes edge-pulse {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="edge-glow">
    <div class="edge edge-top"></div>
    <div class="edge edge-bottom"></div>
    <div class="edge edge-left"></div>
    <div class="edge edge-right"></div>
  </div>
</body>
</html>
